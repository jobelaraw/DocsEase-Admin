<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocsEase – Add Service</title>
  <link rel="icon" type="image/png" href="../assets/logo_whitebg.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy: #002D62;
      --sidebar-bg: #ffffff;
      --main-bg: #dce8f5;
      --card-bg: #ffffff;
      --text-dark: #0d1f3c;
      --text-muted: #6b7a99;
      --active-bg: #e8eef8;
      --shadow: 0 8px 24px rgba(10, 30, 80, 0.08);
      --input-border: #d1d9e6;
    }

    body,
    input,
    button,
    a,
    select,
    textarea {
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      max-height: 100vh;
      display: flex;
      background: var(--main-bg);
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 310px;
      min-width: 310px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 28px 0 24px 0;
      box-shadow: 2px 0 12px rgba(10, 30, 80, 0.07);
      z-index: 10;
      height: 100%;
      transition: width 0.25s ease, min-width 0.25s ease;
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: 72px;
      min-width: 72px;
    }

    .sidebar.collapsed .sidebar-logo {
      padding: 0 0 32px 0;
      justify-content: center;
    }

    .sidebar.collapsed .nav-item {
      justify-content: center;
      padding: 14px 0;
    }

    .logo-text,
    .nav-label {
      overflow: hidden;
      white-space: nowrap;
      opacity: 1;
      max-width: 200px;
      transition: opacity 0.25s ease, max-width 0.25s ease;
    }

    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .nav-label {
      opacity: 0;
      max-width: 0;
    }

    .btn-collapse {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.6;
      transition: opacity 0.18s;
    }

    .btn-collapse:hover {
      opacity: 1;
    }

    .btn-collapse img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .sidebar-bottom {
      padding: 12px 16px;
      margin-top: auto;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 28px 32px 28px;
    }

    .sidebar-logo .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-logo .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .sidebar-logo .logo-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1;
    }

    .sidebar-logo .brand-img {
      height: 17px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .sidebar-nav-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s;
    }

    .nav-item:hover,
    .nav-item.active {
      background: var(--active-bg);
    }

    .nav-item .nav-icon {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-item .nav-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .nav-item .nav-label {
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-back {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
      padding: 8px 0;
      transition: opacity 0.2s;
    }

    .btn-back:hover {
      opacity: 0.6;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .user-info {
      text-align: right;
      line-height: 1.2;
    }

    .user-info .user-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .user-info .user-role {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      overflow: hidden;
      background: #d9d9d9;
      flex-shrink: 0;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content {
      flex: 1;
      padding: 0 40px 24px 40px;
      overflow-y: auto;
    }

    .content::-webkit-scrollbar {
      width: 6px;
    }

    .content::-webkit-scrollbar-track {
      background: transparent;
    }

    .content::-webkit-scrollbar-thumb {
      background: rgba(13, 31, 60, 0.15);
      border-radius: 10px;
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: rgba(13, 31, 60, 0.3);
    }

    .form-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 20px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-dark);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 12px 14px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--navy);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .tab-item input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.95rem;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .btn-delete:hover {
      opacity: 1;
    }

    .btn-delete img {
      width: 18px;
      height: 18px;
    }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: none;
      border: 1px dashed var(--input-border);
      border-radius: 8px;
      color: var(--navy);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add:hover {
      background: #f5f7fa;
    }

    .req-group {
      background: #f0f4fb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .req-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .req-header input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-weight: 600;
    }

    .req-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .req-item .drag-handle {
      cursor: move;
      color: var(--text-muted);
      font-size: 1.2rem;
      padding-top: 8px;
    }

    .req-item input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
    }

    .req-item select {
      width: 240px;
      padding: 10px 12px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
    }

    .step-card {
      background: #f0f4fb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .step-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .actions-bar {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 24px 40px;
      background: var(--main-bg);
      border-top: 1px solid #e0e6ed;
    }

    .btn-cancel {
      padding: 12px 32px;
      background: #fff;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--navy);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover {
      background: #f5f7fa;
    }

    .btn-save {
      padding: 12px 32px;
      background: var(--navy);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-save:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><img src="../assets/logo_whitebg.png" alt="DocsEase Logo" /></div>
      <div class="logo-text"><img src="../assets/docsease_text.png" alt="DocsEase" class="brand-img" /></div>
    </div>

    <div class="sidebar-nav-container">
      <nav class="sidebar-nav">
        <a href="../Sidebar/dashboard.html" class="nav-item">
          <div class="nav-icon"><img src="../assets/dashboard.png" alt="Dashboard" /></div>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="../Sidebar/service_management.html" class="nav-item active">
          <div class="nav-icon"><img src="../assets/service_mngment.png" alt="Service Management" /></div>
          <span class="nav-label">Service Management</span>
        </a>
        <a href="../Sidebar/map_management.html" class="nav-item">
          <div class="nav-icon"><img src="../assets/map_mngment.png" alt="Map Management" /></div>
          <span class="nav-label">Map Management</span>
        </a>
        <a href="../Sidebar/analytics.html" class="nav-item">
          <div class="nav-icon"><img src="../assets/analytics.png" alt="Analytics" /></div>
          <span class="nav-label">Analytics</span>
        </a>
      </nav>
    </div>

    <div class="sidebar-bottom">
      <button class="btn-collapse" onclick="toggleSidebar()" title="Collapse sidebar">
        <img src="../assets/collapse.png" alt="Collapse" />
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-back" onclick="history.back()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <h1 class="page-title">Add Service</h1>
      </div>
      <div class="user-profile">
        <div class="user-info">
          <div class="user-name">Admin user</div>
          <div class="user-role">Profile</div>
        </div>
        <div class="user-avatar">
            <a href="../Authentication/auth.html">
              <img src="../assets/user_profile.png" alt="Admin profile" />
            </a>
        </div>
      </div>
    </header>

    <div class="content">
      <!-- General Details -->
      <div class="form-section">
        <h3 class="section-title">General Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Service Name</label>
            <select>
              <option>New Business Application</option>
              <option>Renewal of Business Application</option>
              <option>Retirement of Business</option>
            </select>
          </div>
          <div class="form-group">
            <label>Office</label>
            <select>
              <option>Business Permit and Licensing Office</option>
              <option>Office of the Building Official</option>
            </select>
          </div>
        </div>
        <div class="form-group full-width">
          <label>Service Description</label>
          <textarea placeholder="Provide assistance to new business owners to apply for business permit."></textarea>
        </div>
      </div>

      <!-- Tab/Sub-Service -->
      <div class="form-section">
        <h3 class="section-title">Tab/Sub-Service</h3>
        <div class="tab-item">
          <input type="text" value="Walk in" readonly />
          <button class="btn-delete"><img src="../assets/delete.png" alt="Delete" /></button>
        </div>
        <input type="text" placeholder="Enter Tab Name/Sub-Service Name..."
          style="width: 100%; padding: 12px 14px; border: 1px solid var(--input-border); border-radius: 8px; margin-bottom: 12px;" />
        <button class="btn-add">+ Add</button>
      </div>

      <!-- Requirements -->
      <div class="form-section">
        <h3 class="section-title">Requirements</h3>
        <div class="req-group">
          <div class="req-header">
            <input type="text" value="New Business Application Requirements" />
            <button class="btn-delete"><img src="../assets/delete.png" alt="Delete" /></button>
          </div>
          <div class="req-item">
            <span class="drag-handle">⋮⋮</span>
            <input type="text" value="BPLO FORM 001-2: Application Form For Business Permit" />
            <select>
              <option>Business Permit and Licensing...</option>
            </select>
            <button class="btn-delete"><img src="../assets/delete.png" alt="Delete" /></button>
          </div>
          <div class="req-item">
            <span class="drag-handle">⋮⋮</span>
            <input type="text" value="Occupancy Permit (if applicable)" />
            <select>
              <option>Business Permit and Licensing...</option>
            </select>
            <button class="btn-delete"><img src="../assets/delete.png" alt="Delete" /></button>
          </div>
          <button class="btn-add">+ Click here to add new requirement......</button>
        </div>
        <button class="btn-add">+ Click here to add set of requirements.....</button>
      </div>

      <!-- Step-by-Step Guide -->
      <div class="form-section">
        <h3 class="section-title">Step-by-Step Guide</h3>
        <div class="step-card">
          <div class="form-group" style="margin-bottom: 16px;">
            <label>Step Title</label>
            <select>
              <option>Application and Assessment</option>
            </select>
          </div>
          <div class="step-row">
            <div class="form-group">
              <label>Fee</label>
              <select>
                <option>None</option>
              </select>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea
                placeholder="Submit the requirements and accomplish the Application Form for Business Permit."></textarea>
            </div>
          </div>
          <div class="step-row">
            <div class="form-group">
              <label>Processing Time</label>
              <select>
                <option>50 Minutes</option>
              </select>
            </div>
            <div class="form-group">
              <label>People In-Charge</label>
              <textarea placeholder="Claribel Bautista
Nessther Antenucci
Rhodalyn Percia
Michelle Maraming
Rosemarie Urasa"></textarea>
            </div>
          </div>
          <button class="btn-delete" style="margin-top: 8px;"><img src="../assets/delete.png" alt="Delete" /></button>
        </div>

        <div class="step-card">
          <div class="form-group" style="margin-bottom: 16px;">
            <label>Step Title</label>
            <select>
              <option>Payment</option>
            </select>
          </div>
          <div class="step-row">
            <div class="form-group">
              <label>Fee</label>
              <select>
                <option>Based on the Revised Revenue Code (2016) City of Bi...</option>
              </select>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea
                placeholder="Receive fee for the amount indicated in the Tax Order of Payment and Community Tax Certificate for the business"></textarea>
            </div>
          </div>
          <div class="step-row">
            <div class="form-group">
              <label>Processing Time</label>
              <select>
                <option>50 Minutes</option>
              </select>
            </div>
            <div class="form-group">
              <label>People In-Charge</label>
              <textarea placeholder="CTO Personnel"></textarea>
            </div>
          </div>
          <button class="btn-delete" style="margin-top: 8px;"><img src="../assets/delete.png" alt="Delete" /></button>
        </div>

        <button class="btn-add">+ Click here to add new step......</button>
      </div>

      <!-- Location and Contact -->
      <div class="form-section">
        <h3 class="section-title">Location and Contact</h3>
        <div class="form-group" style="margin-bottom: 16px;">
          <label>Location</label>
          <select>
            <option>1st Floor, City Hall Building, Brgy. Zapote, Binan City, Laguna</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Contact Number</label>
            <select>
              <option>(049)513-5084</option>
            </select>
          </div>
          <div class="form-group">
            <label>Email</label>
            <select>
              <option>bplo@binan.gov.ph</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="actions-bar">
      <button class="btn-cancel" onclick="history.back()">Cancel</button>
      <button class="btn-save" onclick="window.location.href='../Sidebar/service_management.html'">Save Service</button>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('collapsed');
    }
  </script>

</body>

</html>
