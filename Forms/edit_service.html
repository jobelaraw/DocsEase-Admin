<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocsEase – Edit Service</title>
  <link rel="icon" type="image/png" href="../assets/logo_whitebg.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy: #002D62;
      --sidebar-bg: #ffffff;
      --main-bg: #dce8f5;
      --card-bg: #ffffff;
      --text-dark: #0d1f3c;
      --text-muted: #6b7a99;
      --active-bg: #e8eef8;
      --shadow: 0 8px 24px rgba(10, 30, 80, 0.08);
      --input-border: #d1d9e6;
    }

    body,
    input,
    button,
    a,
    select,
    textarea {
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      max-height: 100vh;
      display: flex;
      background: var(--main-bg);
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 310px;
      min-width: 310px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 28px 0 24px 0;
      box-shadow: 2px 0 12px rgba(10, 30, 80, 0.07);
      z-index: 10;
      height: 100%;
      transition: width 0.25s ease, min-width 0.25s ease;
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: 72px;
      min-width: 72px;
    }

    .sidebar.collapsed .sidebar-logo {
      padding: 0 0 32px 0;
      justify-content: center;
    }

    .sidebar.collapsed .nav-item {
      justify-content: center;
      padding: 14px 0;
    }

    .sidebar.collapsed .sidebar-nav-container {
      align-items: center;
      padding: 0;
    }

    .sidebar.collapsed .sidebar-nav {
      width: 100%;
      align-items: center;
    }

    .sidebar.collapsed .sidebar-bottom {
      display: flex;
      justify-content: center;
      padding: 12px 0;
    }

    .logo-text,
    .nav-label {
      overflow: hidden;
      white-space: nowrap;
      opacity: 1;
      max-width: 200px;
      transition: opacity 0.25s ease, max-width 0.25s ease;
    }

    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .nav-label {
      opacity: 0;
      max-width: 0;
    }

    .btn-collapse {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.6;
      transition: opacity 0.18s;
    }

    .btn-collapse:hover {
      opacity: 1;
    }

    .btn-collapse img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .sidebar-bottom {
      padding: 12px 16px;
      margin-top: auto;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 28px 32px 28px;
    }

    .sidebar-logo .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-logo .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .sidebar-logo .logo-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1;
    }

    .sidebar-logo .brand-img {
      height: 17px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .sidebar-nav-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s;
    }

    .nav-item:hover,
    .nav-item.active {
      background: var(--active-bg);
    }

    .nav-item .nav-icon {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-item .nav-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .nav-item .nav-label {
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-back {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      color: var(--navy);
      transition: opacity 0.2s;
    }

    .btn-back:hover {
      opacity: 0.6;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .user-info {
      text-align: right;
      line-height: 1.2;
    }

    .user-info .user-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .user-info .user-role {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      overflow: hidden;
      background: #d9d9d9;
      flex-shrink: 0;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── TAB BAR ── */
    .tab-bar {
      display: flex;
      margin: 0 40px 16px 40px;
      background: #E8EDF2;
      border-radius: 12px;
      padding: 5px;
      gap: 4px;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }

    .tab-btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
      background: none;
      color: var(--text-muted);
    }

    .tab-btn.active {
      background: #ffffff;
      color: #2F2FE4;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(10, 30, 80, 0.10);
    }

    /* ── SCROLLABLE CONTENT ── */
    .content {
      flex: 1;
      padding: 0 40px 0 40px;
      overflow-y: auto;
    }

    .content::-webkit-scrollbar {
      width: 6px;
    }

    .content::-webkit-scrollbar-track {
      background: transparent;
    }

    .content::-webkit-scrollbar-thumb {
      background: rgba(13, 31, 60, 0.15);
      border-radius: 10px;
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: rgba(13, 31, 60, 0.3);
    }

    /* ── FORM SECTIONS ── */
    .form-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 20px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-dark);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 11px 13px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 0.93rem;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--navy);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 76px;
    }

    /* ── TAB/SUB-SERVICE ── */
    .tab-chips {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .tab-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      background: #fff;
    }

    .tab-chip span {
      font-size: 0.93rem;
      color: var(--text-dark);
      font-weight: 500;
    }

    .tab-chip-input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 0.93rem;
      outline: none;
    }

    .btn-icon {
      background: none;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.18s;
      flex-shrink: 0;
    }

    .btn-icon:hover {
      background: #f0f4fb;
    }

    .btn-icon img {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .btn-delete-plain {
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
      padding: 2px;
    }

    .btn-delete-plain:hover {
      opacity: 1;
    }

    .btn-delete-plain img {
      width: 17px;
      height: 17px;
    }

    /* ── REQUIREMENTS ── */
    .req-group {
      background: #f0f4fb;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .req-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .req-group-header input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      outline: none;
    }

    .req-item {
      display: grid;
      grid-template-columns: 20px 1fr auto auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .drag-handle {
      color: var(--text-muted);
      font-size: 1rem;
      cursor: move;
      text-align: center;
    }

    .req-item input {
      padding: 9px 12px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }

    .req-item-right {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-start;
    }

    .req-item-right label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }

    .req-item-right select {
      padding: 8px 10px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      min-width: 210px;
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 11px 14px;
      background: none;
      border: 1px dashed var(--input-border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.18s;
    }

    .btn-add:hover {
      background: #f5f7fa;
    }

    /* ── STEP CARD ── */
    .step-card {
      background: #f0f4fb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 14px;
      position: relative;
    }

    .step-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .step-delete {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .step-delete:hover {
      opacity: 1;
    }

    .step-delete img {
      width: 17px;
      height: 17px;
    }

    /* ── ACTIONS BAR ── */
    .actions-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      padding: 16px 40px;
      background: var(--main-bg);
      border-top: 1px solid #d1d9e6;
      flex-shrink: 0;
    }

    .btn-delete-service {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: #fff;
      border: 1.5px solid #e74c3c;
      border-radius: 8px;
      color: #e74c3c;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-right: auto;
      transition: background 0.2s;
    }

    .btn-delete-service:hover {
      background: #fff0ee;
    }

    .btn-delete-service img {
      width: 16px;
      height: 16px;
    }

    .btn-discard {
      padding: 12px 28px;
      background: #fff;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--navy);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-discard:hover {
      background: #f5f7fa;
    }

    .btn-save {
      padding: 12px 28px;
      background: linear-gradient(to right, #0a3966, #3b7bb5);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-save:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><img src="../assets/logo_whitebg.png" alt="DocsEase Logo" /></div>

    </div>
    <div class="sidebar-nav-container">
      <nav class="sidebar-nav">
        <a href="../Sidebar/dashboard.html" class="nav-item">

      </nav>

    <div class="sidebar-bottom">
      <button class="btn-collapse" onclick="toggleSidebar()" title="Collapse sidebar">
        <img src="../assets/collapse.png" alt="Collapse" />
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-back" onclick="history.back()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <h1 class="page-title" id="page-title">Edit Service: New Business Application</h1>
      </div>
      <div class="user-profile">
        <div class="user-info">
          <div class="user-name">Admin user</div>
          <div class="user-role">Profile</div>
        </div>
            <a href="../Authentication/auth.html">
              <img src="../assets/user_profile.png" alt="Admin profile" />
            </a>
      </div>
    </header>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab(this)">Walk in</button>
      <button class="tab-btn" onclick="switchTab(this)">Online</button>
    </div>

    <div class="content">

      <!-- General Details -->
      <div class="form-section">
        <h3 class="section-title">General Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Service Name</label>
            <select>
              <option>New Business Application</option>
              <option>Renewal of Business Application</option>
              <option>Retirement of Business</option>
            </select>
          </div>
          <div class="form-group">
            <label>Office</label>
            <select>
              <option>Business Permit and Licensing Office</option>
              <option>Office of the Building Official</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Service Description</label>
          <textarea>Provide assistance to new business owners to apply for business permit.</textarea>
        </div>
      </div>

      <!-- Tab/Sub-Service -->
      <div class="form-section">
        <h3 class="section-title">Tab/Sub-Service</h3>
        <div class="tab-chips">
          <div class="tab-chip">
            <span>Walk in</span>
            <button class="btn-delete-plain"><img src="../assets/delete.png" alt="Delete" /></button>
          </div>
          <div class="tab-chip">
            <span>Online</span>
            <button class="btn-delete-plain"><img src="../assets/delete.png" alt="Delete" /></button>
          </div>
          <input class="tab-chip-input" type="text" placeholder="Enter Tab Name/Sub-Service Name..." />
          <button class="btn-icon">

              stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Requirements -->
      <div class="form-section">
        <h3 class="section-title">Requirements</h3>
        <div class="req-group">
          <div class="req-group-header">
            <input type="text" value="New Business Application Requirements" />
            <button class="btn-delete-plain" style="margin-left:10px;"><img src="../assets/delete.png"
                alt="Delete" /></button>
          </div>
          <div class="req-item">
            <span class="drag-handle">⋮⋮</span>
            <input type="text" value="BPLO FORM 001-2: Application Form For Business Permit" />
            <div class="req-item-right">
              <label>Secure At</label>
              <select>
                <option>Business Permit and Licensing...</option>
              </select>
            </div>
            <button class="btn-delete-plain"><img src="../assets/delete.png" alt="Delete" /></button>
          </div>
          <div class="req-item">
            <span class="drag-handle">⋮⋮</span>
            <input type="text" value="Occupancy Permit (if applicable)" />
            <div class="req-item-right">
              <label>Secure At</label>
              <select>
                <option>Business Permit and Licensing...</option>
              </select>
            </div>
            <button class="btn-delete-plain"><img src="../assets/delete.png" alt="Delete" /></button>
          </div>
          <button class="btn-add">+ Click here to add new requirement......</button>
        </div>
        <button class="btn-add">+ Click here to add set of requirements.....</button>
      </div>

      <!-- Step-by-Step Guide -->
      <div class="form-section">
        <h3 class="section-title">Step-by-Step Guide</h3>

        <div class="step-card">
          <button class="step-delete"><img src="../assets/delete.png" alt="Delete" /></button>
          <div class="form-group" style="margin-bottom:14px;">
            <label>Step Title</label>
            <select>
              <option>Application and Assessment</option>
            </select>
          </div>
          <div class="step-grid">
            <div>
              <div class="form-group" style="margin-bottom:14px;">
                <label>Fee</label>
                <select>
                  <option>None</option>
                </select>
              </div>
              <div class="form-group">
                <label>Processing Time</label>
                <select>
                  <option>50 Minutes</option>
                </select>
              </div>
            </div>
            <div>
              <div class="form-group" style="margin-bottom:14px;">
                <label>Description</label>
                <textarea>Shall submit the requirements and accomplish the Application Form for Business Permit.</textarea>
              </div>
              <div class="form-group">
                <label>People In-Charge</label>
                <textarea>Claribel Bautista
Nessther Almenanza
Zyra kaye Castillo
Michelle Maramag
Rosemarie Umali</textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="step-card">
          <button class="step-delete"><img src="../assets/delete.png" alt="Delete" /></button>
          <div class="form-group" style="margin-bottom:14px;">
            <label>Step Title</label>
            <select>
              <option>Payment</option>
            </select>
          </div>
          <div class="step-grid">
            <div>
              <div class="form-group" style="margin-bottom:14px;">
                <label>Fee</label>
                <select>
                  <option>Based on the Revised Revenue Code (2016) City of Bi...</option>
                </select>
              </div>
              <div class="form-group">
                <label>Processing Time</label>
                <select>
                  <option>50 Minutes</option>
                </select>
              </div>
            </div>
            <div>
              <div class="form-group" style="margin-bottom:14px;">
                <label>Description</label>
                <textarea>Shall pay for the amount indicated in the Tax Order of Payment and Community Tax Certificate for the business</textarea>
              </div>
              <div class="form-group">
                <label>People In-Charge</label>
                <textarea>CTO Personnel</textarea>
              </div>
            </div>
          </div>
        </div>
