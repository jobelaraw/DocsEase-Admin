<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Sign Up</title>
  <link rel="icon" type="image/png" href="../assets/logo_whitebg.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a3a6b;
      --navy-dark: #122a52;
      --navy-btn: #002D62;
      --navy-btn-hover: #2F578A;
      --link-blue: #2057CE;
      --bg-overlay: rgba(210, 225, 245, 0.55);
      --card-bg: #ffffff;
      --input-bg: #d9d9d9;
      --input-border: transparent;
      --text-dark: #1a2540;
      --text-muted: #757575;
      --label: #4a4a4a;
    }

    body, input, button, select, textarea, a {
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #c8d9ee;
      position: relative;
      overflow: hidden;
    }

    .bg-photo {
      position: fixed;
      inset: 0;
      background: url('../assets/bg_cityhall.png') center center / cover no-repeat;
      filter: blur(0px) brightness(0.92);
      z-index: 0;
    }

    .bg-tint {
      position: fixed;
      inset: 0;
      background: rgba(180, 210, 240, 0.45);
      z-index: 1;
    }

    /* ── Top bar ── */
    .topbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 28px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1;
    }

    .logo-text .brand-img {
      height: 17px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    /* ── Main layout ── */
    .page-center {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 25px 0px 20px 0px;
      width: 100%;
      max-width: 480px;
      height: 600px;
      box-shadow: 0 10px 45px rgba(10, 30, 70, 0.15);
      display: flex;
      flex-direction: column;
    }

    .card-content {
      padding: 0 40px;
    }

    .card-content.form-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    /* Avatar */
    .avatar {
      display: flex;
      justify-content: center;
      margin-bottom: 4px;
    }

    .avatar img {
      width: 45px;
      height: 45px;
      object-fit: contain;
    }

    /* Title */
    .card-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 15px;
      letter-spacing: -0.01em;
    }

    /* Divider */
    .divider {
      height: 2px;
      background: #dde4f0;
      margin-bottom: 25px;
      width: 100%;
    }

    /* Form groups */
    .form-group {
      margin-bottom: 15px;
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--label);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    /* Inputs */
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="text"].pw-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--input-bg);
      border: 2px solid transparent;
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    input.pw-input {
      padding-right: 44px;
    }

    input::placeholder { color: #757575; }

    input:focus {
      border-color: var(--link-blue);
      background-color: #f0f4fb;
    }

    /* REMOVE BROWSER NATIVE EYE OVERLAYS */
    input::-ms-reveal,
    input::-ms-clear {
      display: none !important;
    }
    input::-webkit-contacts-auto-fill-button,
    input::-webkit-credentials-auto-fill-button {
      visibility: hidden;
      display: none !important;
      pointer-events: none;
    }

    /* Password wrapper */
    .password-wrapper {
      position: relative;
      width: 100%;
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #606060;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }

    .toggle-password:hover { color: var(--link-blue); }

    .eye-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
    }

    /* Match hint */
    .input-hint {
      font-size: 0.7rem;
      color: #888;
      margin-top: 3px;
      padding-left: 4px;
      min-height: 14px;
    }

    .input-hint.error   { color: #c0392b; }
    .input-hint.success { color: #27ae60; }

    /* Button */
    .btn-signup {
      width: 100%;
      padding: 12px;
      background: var(--navy-btn);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(6, 49, 101, 0.2);
      margin-top: 4px;
    }

    .btn-signup:hover  { background: var(--navy-btn-hover); }
    .btn-signup:active { transform: scale(0.99); }

    /* Footer */
    .card-footer {
      text-align: center;
      margin-top: 35px; 
      font-size: 0.78rem;
      color: #555;
    }

    .card-footer a {
      color: var(--link-blue);
      font-weight: 700;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="bg-photo"></div>
  <div class="bg-tint"></div>

  <header class="topbar">
    <div class="logo-icon">
      <img src="../assets/logo.png" alt="DocsEase Logo" />
    </div>
    <div class="logo-text">
      <img src="../assets/docsease_text.png" alt="DocsEase" class="brand-img" />
    </div>
  </header>

  <main class="page-center">
    <div class="card">

      <div class="card-content">
        <div class="avatar">
          <img src="../assets/profile_signin.png" alt="profile" />
        </div>
        <h1 class="card-title">Administrator Sign up</h1>
      </div>

      <div class="divider"></div>

      <div class="card-content form-area">
        <form id="signupForm" onsubmit="return false;">

          <div class="form-group">
            <div class="form-row">
              <label for="fullname">Full Name</label>
            </div>
            <input type="text" id="fullname" placeholder="Enter your full name" autocomplete="name" />
          </div>

          <div class="form-group">
            <div class="form-row">
              <label for="email">Email</label>
            </div>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="email" />
          </div>

          <div class="form-group">
            <div class="form-row">
              <label for="password">Password</label>
            </div>
            <div class="password-wrapper">
              <input type="password" id="password" class="pw-input"
                     placeholder="Enter your password" autocomplete="new-password" />
              <button type="button" class="toggle-password" onclick="togglePw('password','eyeIcon1')" aria-label="Toggle password">
                <span id="eyeIcon1" class="eye-container">
                  <img src="../assets/eyeShow.png" alt="Show Password" style="width: 100%; height: 100%; object-fit: contain;" />
                </span>
              </button>
            </div>
          </div>

          <div class="form-group">
            <div class="form-row">
              <label for="confirmPassword">Confirm Password</label>
            </div>
            <div class="password-wrapper">
              <input type="password" id="confirmPassword" class="pw-input"
                     placeholder="Re-enter your password" autocomplete="new-password" />
              <button type="button" class="toggle-password" onclick="togglePw('confirmPassword','eyeIcon2')" aria-label="Toggle confirm password">
                <span id="eyeIcon2" class="eye-container">
                  <img src="../assets/eyeShow.png" alt="Show Password" style="width: 100%; height: 100%; object-fit: contain;" />
                </span>
              </button>
            </div>
            <p id="matchHint" class="input-hint"></p>
          </div>

          <button type="button" class="btn-signup" onclick="window.location.href='../Sidebar/dashboard.html'">Sign up</button>
        </form>

        <p class="card-footer">
          Already have an account? <a href="signin.html">Sign in</a>
        </p>
      </div>

    </div>
  </main>

  <script>
    const eyeShow = `
      <img src="../assets/eyeShow.png" alt="Show Password" style="width: 100%; height: 100%; object-fit: contain;" />
    `;

    const eyeHide = `
      <img src="../assets/eyeHide.png" alt="Hide Password" style="width: 100%; height: 100%; object-fit: contain;" />
    `;

    function togglePw(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(iconId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.innerHTML = isHidden ? eyeHide : eyeShow;
    }

    document.getElementById('confirmPassword').addEventListener('input', checkMatch);
    document.getElementById('password').addEventListener('input', checkMatch);

    function checkMatch() {
      const pw   = document.getElementById('password').value;
      const cpw  = document.getElementById('confirmPassword').value;
      const hint = document.getElementById('matchHint');
      if (!cpw) { hint.textContent = ''; return; }
      if (pw === cpw) {
        hint.textContent = 'Passwords match ✓';
        hint.className = 'input-hint success';
      } else {
        hint.textContent = 'Passwords do not match';
        hint.className = 'input-hint error';
      }
    }
  </script>

</body>
</html>
