<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Sign In</title>
  <style>
    /* ── 1. Import the font ── */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a3a6b;
      --navy-dark: #122a52;
      --navy-btn: #002D62; 
      --navy-btn-hover: #2F578A;
      --link-blue: #2057CE;
      --bg-overlay: rgba(210, 225, 245, 0.55);
      --card-bg: #ffffff;
      --input-bg: #d9d9d9; 
      --input-border: transparent;
      --text-dark: #1a2540;
      --text-muted: #757575;
      --label: #4a4a4a; 
    }

    body, input, button, select, textarea, a {
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #c8d9ee;
      position: relative;
      overflow: hidden;
    }

    /* ── Background image layer ── */
    .bg-photo {
      position: fixed;
      inset: 0;
      background: url('assets/bg_cityhall.png') center center / cover no-repeat;
      filter: blur(0px) brightness(0.92);
      z-index: 0;
    }

    /* Blue tint overlay */
    .bg-tint {
      position: fixed;
      inset: 0;
      background: rgba(180, 210, 240, 0.45);
      z-index: 1;
    }

    /* ── Top bar ── */
    .topbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center; 
      gap: 14px;
      padding: 18px 28px;
    }

    .logo-icon {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .logo-text {
      display: flex;
      flex-direction: column; 
      justify-content: center;
      line-height: 1;
    }

    .logo-text .brand-img {
      height: 30px; 
      width: auto;
      object-fit: contain;
      display: block;
    }

    /* ── Main layout ── */
    .page-center {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      align-items: flex-start; 
      justify-content: center;
      padding: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 45px 0px 50px 0px; 
      width: 100%;
      max-width: 570px;   
      height: 680px;  
      box-shadow: 0 10px 45px rgba(10, 30, 70, 0.15);
      display: flex;
      flex-direction: column;
    }

    /* Inner wrapper scaled to keep correct proportions inside the larger container */
    .card-content {
      padding: 0 55px; 
    }
    
    /* Pushes the footer cleanly towards the bottom structure if container expands */
    .card-content.form-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* avatar scaled up slightly for the bigger card */
    .avatar {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .avatar img {
      width: 75px; 
      height: 75px;
      object-fit: contain;
    }

    /* title scaled up */
    .card-title {
      text-align: center;
      font-size: 2rem; 
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 35px;
      letter-spacing: -0.01em;
    }

    /* divider spans edge-to-edge seamlessly */
    .divider {
      height: 1px;
      background: #dde4f0;
      margin-bottom: 45px; 
      width: 100%; 
    }

    /* form groups scaled up for alignment */
    .form-group {
      margin-bottom: 28px;
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    label {
      font-size: 0.9rem; 
      font-weight: 700;
      color: var(--label);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .forgot-link {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--link-blue);
      text-decoration: underline; 
    }

    .forgot-link:hover { opacity: 0.8; }

    input[type="email"],
    input[type="password"],
    input[type="text"].pw-input {
      width: 100%;
      padding: 17px 19px; 
      background: var(--input-bg);
      border: 2px solid transparent; 
      border-radius: 12px;
      font-size: 1rem; 
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    /* Ensure space for eye icon on the right side of the password field */
    input.pw-input {
      padding-right: 50px;
    }

    input::placeholder { color: #757575; }

    input:focus {
      border-color: var(--link-blue);
      background-color: #f0f4fb; 
    }

    /* ── CHANGES APPLIED: Relative container wrapper for eye button placement ── */
    .password-wrapper {
      position: relative;
      width: 100%;
    }

    .toggle-password {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #606060;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }

    .toggle-password:hover {
      color: var(--link-blue);
    }

    .toggle-password svg {
      width: 22px;
      height: 22px;
    }

    /* Sign in button resized and aligned right */
    .btn-signin {
      width: 100%;
      padding: 18px; 
      background: var(--navy-btn);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(6, 49, 101, 0.2);
      margin-top: 10px;
    }

    .btn-signin:hover { background: var(--navy-btn-hover); }
    .btn-signin:active { transform: scale(0.99); }

    /* footer note alignment */
    .card-footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.8rem;
      color: #555;
    }

    .card-footer a {
      color: var(--link-blue);
      font-weight: 700;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="bg-photo"></div>
  <div class="bg-tint"></div>

  <header class="topbar">
    <div class="logo-icon">
      <img src="assets/logo.png" alt="DocsEase Logo" />
    </div>
    <div class="logo-text">
      <img src="assets/docsease_text.png" alt="DocsEase" class="brand-img" />
      </div>
  </header>

  <main class="page-center">
    <div class="card">

      <div class="card-content">
        <div class="avatar">
          <img src="assets/profile_signin.png" alt="profile" />
        </div>
        <h1 class="card-title">Administrator Sign in</h1>
      </div>

      <div class="divider"></div>

      <div class="card-content form-area">
        <form onsubmit="return false;">
          <div class="form-group">
            <div class="form-row">
              <label for="email">Email</label>
            </div>
            <input type="email" id="email" placeholder="Enter your email....."/>
          </div>

          <div class="form-group">
            <div class="form-row">
              <label for="password">Password</label>
              <a href="#" class="forgot-link">Forget Password</a>
            </div>
            
            <div class="password-wrapper">
              <input type="password" id="password" class="pw-input" placeholder="Enter your password....."/>
              <button type="button" id="togglePassword" class="toggle-password" aria-label="Toggle password visibility">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" id="eyeIcon">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-signin">Sign in</button>
        </form>

        <p class="card-footer">
          Don't want to create an account? <a href="#">Sign up</a>
        </p>
      </div>

    </div>
  </main>

  <script>
    const togglePasswordBtn = document.querySelector('#togglePassword');
    const passwordInput = document.querySelector('#password');
    const eyeIcon = document.querySelector('#eyeIcon');

    togglePasswordBtn.addEventListener('click', function () {

      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
     
      if (type === 'text') {
        // Eye icon with slash line (Hidden State)
        eyeIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
        `;
      } else {
        // Standard Eye icon (Visible State)
        eyeIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        `;
      }
    });
  </script>

</body>
</html>
